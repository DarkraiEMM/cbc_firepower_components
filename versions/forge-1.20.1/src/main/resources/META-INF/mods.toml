side="BOTH"

[[dependencies.${mod_id}]]
modId="ritchiesprojectilelib"
mandatory=true
versionRange="${rpl_version_range}"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="createbigcannons"
mandatory=true
versionRange="${cbc_version_range}"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
